name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libssl-dev zlib1g-dev build-essential
    
    - name: Build
      run: |
        cd src
        make clean
        make linux
    
    - name: Run tests
      run: |
        cd src
        make test
    
    - name: Test binary
      run: |
        cd src
        ./clawsec -h || true
        test -f clawsec
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: clawsec-linux
        path: src/clawsec

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        brew install openssl@3
    
    - name: Build
      run: |
        cd src
        make clean
        make macos
    
    - name: Run tests
      run: |
        cd src
        make test-macos
    
    - name: Test binary
      run: |
        cd src
        ./clawsec -h || true
        test -f clawsec
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: clawsec-macos
        path: src/clawsec

  docker-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: clawsec:test
    
    - name: Test Docker image
      run: |
        docker run --rm clawsec:test -h || true
